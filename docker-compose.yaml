services:
  db:
    container_name: trrim-db
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trrim-db
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    container_name: trrim-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - 9000:9000   # S3 API (R2 replacement)
      - 9001:9001   # MinIO web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    container_name: trrim-minio-init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio minio123;
        mc mb --ignore-existing local/trrim-clips;
        mc anonymous set download local/trrim-clips;
      "
    restart: on-failure

  server:
    container_name: trrim-server
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      RUST_LOG: server=debug,tower_http=debug
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trrim-db
      # MinIO as local R2 replacement
      R2_ENDPOINT: http://minio:9000
      R2_BUCKET: trrim-clips
      R2_PUBLIC_URL: http://localhost:9000/trrim-clips
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      # Copy from your .env
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-change-me-secret}
    ports:
      - 3001:3001

volumes:
  postgres-data:
  minio-data:
